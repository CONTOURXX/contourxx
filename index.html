<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Contourxx">
<title>Contourxx</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; }

video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
#canvas { position:fixed; inset:0; width:100%; height:100%; z-index:2; }

#screen-start {
  position:fixed; inset:0; z-index:20; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; padding:32px;
}
#screen-start h1 { color:#fff; font-size:22px; font-weight:700; }
.btn-main {
  padding:15px 48px; border-radius:50px;
  border:2px solid #00e5ff; background:rgba(0,229,255,0.12);
  color:#00e5ff; font-size:16px; font-weight:700;
  cursor:pointer; -webkit-appearance:none;
}
.btn-main:active { background:rgba(0,229,255,0.28); }

#screen-err {
  position:fixed; inset:0; z-index:20; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  padding:32px; text-align:center;
}
#screen-err h2 { color:#ff5555; font-size:18px; }
#screen-err p  { color:#888; font-size:13px; line-height:1.7; }

#top-right {
  position:fixed; right:16px;
  top:calc(env(safe-area-inset-top,0px) + 10px);
  z-index:10; display:none;
  flex-direction:column; gap:8px; align-items:flex-end;
}
.icon-btn {
  width:44px; height:44px; border-radius:12px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; color:#fff;
  -webkit-appearance:none;
}
.icon-btn:active { background:rgba(0,229,255,0.2); }
.icon-btn.on { border-color:#00e5ff; color:#00e5ff; background:rgba(0,229,255,0.15); }

#bottombar {
  position:fixed; bottom:0; left:0; right:0;
  z-index:10; display:none;
  justify-content:center; align-items:center; gap:10px;
  padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 12px);
  background:linear-gradient(transparent, rgba(0,0,0,0.7) 40%);
}
.ptype-btn {
  padding:10px 28px; border-radius:50px;
  border:1.5px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  color:rgba(255,255,255,0.5); font-size:14px; font-weight:700;
  cursor:pointer; -webkit-appearance:none; transition:all 0.15s;
}
.ptype-btn.active { border-color:#00e5ff; color:#00e5ff; background:rgba(0,229,255,0.15); }
.ptype-btn:active { transform:scale(0.96); }

/* Flash */
#flash { position:fixed; inset:0; z-index:50; background:#fff; opacity:0; pointer-events:none; transition:opacity 0.06s; }

/* Photo preview */
#photo-preview {
  position:fixed; inset:0; z-index:40;
  background:rgba(0,0,0,0.85);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:14px;
}
#photo-preview img {
  max-width:92vw; max-height:78vh;
  border-radius:10px;
  box-shadow:0 0 40px rgba(0,0,0,0.8);
}
#photo-preview p {
  color:rgba(255,255,255,0.45); font-size:12px;
}

/* Capture button */
#btn-capture {
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 86px);
  left:50%; transform:translateX(-50%);
  z-index:10; display:none;
  width:60px; height:60px; border-radius:50%;
  background:rgba(255,255,255,0.15);
  border:3px solid #fff;
  cursor:pointer; -webkit-appearance:none;
  align-items:center; justify-content:center;
}
#btn-capture::after {
  content:''; width:44px; height:44px; border-radius:50%; background:#fff;
}
#btn-capture:active { transform:translateX(-50%) scale(0.93); }
  position:fixed; top:calc(env(safe-area-inset-top,0px) + 10px);
  left:50%; transform:translateX(-50%);
  z-index:15; display:none;
  padding:8px 20px; border-radius:20px;
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(255,220,0,0.5);
  color:#ffdd00; font-size:13px; font-weight:600;
  white-space:nowrap; pointer-events:none;
}

/* Calib confirm bar */
#calib-bar {
  position:fixed; bottom:calc(env(safe-area-inset-bottom,0px) + 80px);
  left:50%; transform:translateX(-50%);
  z-index:15; display:none;
  gap:10px; align-items:center;
  background:rgba(0,0,0,0.75);
  border:1px solid rgba(255,220,0,0.4);
  border-radius:16px; padding:10px 16px;
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
#calib-bar input {
  width:90px; padding:8px 10px; border-radius:8px;
  border:1.5px solid rgba(255,220,0,0.5);
  background:#000; color:#fff; font-size:18px; font-weight:700;
  text-align:center; outline:none; -webkit-appearance:none;
}
#calib-bar input:focus { border-color:#ffdd00; }
#calib-bar span { color:#aaa; font-size:13px; }
#calib-ok {
  padding:9px 18px; border-radius:10px;
  border:1.5px solid rgba(255,220,0,0.5);
  background:rgba(255,220,0,0.15);
  color:#ffdd00; font-size:14px; font-weight:700;
  cursor:pointer; -webkit-appearance:none;
}
#calib-ok:active { background:rgba(255,220,0,0.3); }
#calib-cancel {
  padding:9px 14px; border-radius:10px;
  border:1px solid rgba(255,255,255,0.15);
  background:transparent; color:#666;
  font-size:13px; font-weight:600;
  cursor:pointer; -webkit-appearance:none;
}
</style>
</head>
<body>

<div id="screen-start">
  <h1>Contourxx</h1>
  <button class="btn-main" onclick="startCamera()">開啟相機</button>
</div>
<div id="screen-err">
  <h2>⚠️ 無法開啟相機</h2>
  <p>請確認 Safari 已允許相機權限<br>設定 → Safari → 相機 → 允許</p>
  <p id="err-detail" style="color:#555;font-size:12px;"></p>
  <button class="btn-main" onclick="location.reload()">重試</button>
</div>

<div id="flash"></div>
<div id="photo-preview" onclick="closePreview()">
  <img id="preview-img" src="" alt="截圖預覽">
  <p>長按圖片可儲存到相簿　點擊任意處關閉</p>
</div>

<video id="video" autoplay playsinline muted webkit-playsinline></video>
<canvas id="canvas"></canvas>

<button id="btn-capture" onclick="capture()"></button>

<div id="calib-prompt"></div>

<div id="top-right">
  <button class="icon-btn" id="btn-calib" onclick="toggleCalib()">⊕</button>
  <button class="icon-btn" id="btn-flip"  onclick="flipContour()">⇄</button>
</div>

<div id="bottombar">
  <button class="ptype-btn active" onclick="selectPallet('J2')">J2</button>
  <button class="ptype-btn"        onclick="selectPallet('J1')">J1</button>
  <button class="ptype-btn"        onclick="selectPallet('Q7')">Q7</button>
</div>

<div id="calib-bar">
  <input id="calib-input" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="cm" min="1" max="999">
  <span>cm</span>
  <button id="calib-ok"     onclick="confirmCalib()">確認</button>
  <button id="calib-cancel" onclick="cancelCalib()">取消</button>
</div>

<script>
const video       = document.getElementById('video');
const canvas      = document.getElementById('canvas');
const ctx         = canvas.getContext('2d');
const topRight    = document.getElementById('top-right');
const bottombar   = document.getElementById('bottombar');
const calibPrompt = document.getElementById('calib-prompt');
const calibBar    = document.getElementById('calib-bar');
const calibInput  = document.getElementById('calib-input');
const btnCalib    = document.getElementById('btn-calib');
const btnCapture  = document.getElementById('btn-capture');
const flash       = document.getElementById('flash');
const photoPreview= document.getElementById('photo-preview');
const previewImg  = document.getElementById('preview-img');

const PALLETS = {
  J2: { W:244, H:300, H_CORNER:190, W_TOP:120 },
  J1: { W:244, H:295, H_CORNER:130, W_TOP:105 },
  Q7: { W:244, H:300, H_CORNER:244, W_TOP:179 },
};

let scale      = 0.42;
let posX       = 0, posY = 0;
let flipped    = true;
let currentKey = 'J2';

// calib
// modes: 'off' | 'placing' (both pts draggable) | 'done' (show input bar)
let calibMode = 'off';
let pt1 = null, pt2 = null;   // screen coords (CSS px)
let draggingPt = null;        // 1 or 2

function dpr() { return window.devicePixelRatio || 1; }

function getPoly(key, flipped) {
  const p = PALLETS[key];
  const rCutW = (p.W - p.W_TOP) / p.W;
  const rCutH = (p.H - p.H_CORNER) / p.H;
  const poly = [[0,1],[1,1],[1,rCutH],[1-rCutW,0],[0,0]];
  if (flipped) return poly.map(([rx,ry]) => [1-rx, ry]);
  return poly;
}

function selectPallet(key) {
  currentKey = key;
  document.querySelectorAll('.ptype-btn').forEach(b =>
    b.classList.toggle('active', b.textContent === key));
}

function flipContour() { flipped = !flipped; }

// snap: if angle within 5° of H or V, snap to it
function snapPoint(base, raw) {
  const dx = raw.x - base.x, dy = raw.y - base.y;
  const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
  const len   = Math.hypot(dx, dy);
  // horizontal: angle near 0 or 180
  if (angle < 5 || angle > 175) return {x: base.x + (dx < 0 ? -len : len), y: base.y};
  // vertical: angle near 90
  if (angle > 85 && angle < 95) return {x: base.x, y: base.y + (dy < 0 ? -len : len)};
  return raw;
}

// ── Calibration ─────────────────────────────────────────────
function toggleCalib() {
  if (calibMode !== 'off') { cancelCalib(); return; }
  // place pts at centre by default
  const W = window.innerWidth, H = window.innerHeight;
  pt1 = {x: W*0.5, y: H*0.35};
  pt2 = {x: W*0.5, y: H*0.65};
  calibMode = 'placing';
  btnCalib.classList.add('on');
  calibPrompt.style.display = 'block';
  calibPrompt.textContent   = '拖移兩端點對齊已知線段';
  calibBar.style.display    = 'flex';
  setTimeout(() => calibInput.focus(), 200);
}

function cancelCalib() {
  calibMode = 'off'; pt1 = pt2 = null; draggingPt = null;
  btnCalib.classList.remove('on');
  calibPrompt.style.display = 'none';
  calibBar.style.display    = 'none';
  calibInput.value = '';
}

function confirmCalib() {
  const cm = parseFloat(calibInput.value);
  if (!cm || cm <= 0) { calibInput.focus(); return; }
  const pixLen  = Math.hypot(pt2.x - pt1.x, pt2.y - pt1.y);
  const pxPerCm = pixLen / cm;
  const p       = PALLETS[currentKey];
  scale = (p.H * pxPerCm) / window.innerHeight;
  cancelCalib();
}

// ── Touch ────────────────────────────────────────────────────
let touches  = {};
let lastDist = null;
let dragContour = false;

const HIT = 36; // px hit radius for dragging pts

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t =>
    touches[t.identifier] = {x:t.clientX, y:t.clientY});
  const ids = Object.keys(touches);

  if (calibMode === 'placing') {
    // check if touching a calibration point
    const t0 = touches[ids[0]];
    if (pt1 && dist2(t0, pt1) < HIT)      { draggingPt = 1; return; }
    if (pt2 && dist2(t0, pt2) < HIT)      { draggingPt = 2; return; }
    draggingPt = null; return;
  }

  draggingPt = null;
  if (ids.length === 2) { lastDist = dist2(touches[ids[0]], touches[ids[1]]); dragContour = false; }
  else { lastDist = null; dragContour = true; }
}, {passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const prev = {};
  Object.keys(touches).forEach(k => prev[k] = {...touches[k]});
  Array.from(e.changedTouches).forEach(t =>
    touches[t.identifier] = {x:t.clientX, y:t.clientY});
  const ids = Object.keys(touches);

  if (calibMode === 'placing' && draggingPt) {
    const raw = touches[ids[0]];
    const base = draggingPt === 1 ? pt2 : pt1;
    const snapped = base ? snapPoint(base, raw) : raw;
    if (draggingPt === 1) pt1 = snapped;
    else                  pt2 = snapped;
    return;
  }

  if (ids.length === 2) {
    const d = dist2(touches[ids[0]], touches[ids[1]]);
    if (lastDist) { scale *= d/lastDist; scale = Math.max(0.12, Math.min(1.8, scale)); }
    lastDist = d; dragContour = false;
  } else if (ids.length === 1 && dragContour) {
    const id = ids[0];
    const dx = (touches[id].x - (prev[id]?.x || touches[id].x)) / window.innerWidth;
    const dy = (touches[id].y - (prev[id]?.y || touches[id].y)) / window.innerHeight;
    posX = Math.max(-0.4, Math.min(0.4, posX + dx));
    posY = Math.max(-0.4, Math.min(0.4, posY + dy));
  }
}, {passive:false});

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => delete touches[t.identifier]);
  if (Object.keys(touches).length < 2) lastDist = null;
  draggingPt = null;
}, {passive:false});

function dist2(a,b) { return Math.hypot(a.x-b.x, a.y-b.y); }

// ── Camera ───────────────────────────────────────────────────
async function startCamera() {
  const tries = [
    {video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false},
    {video:{facingMode:'environment'},audio:false},
    {video:true,audio:false}
  ];
  let stream = null;
  for (const c of tries) {
    try { stream = await navigator.mediaDevices.getUserMedia(c); break; }
    catch(e) { if (c===tries[tries.length-1]) { showErr(e); return; } }
  }
  video.srcObject = stream;
  video.onloadedmetadata = () => video.play().then(() => {
    document.getElementById('screen-start').style.display = 'none';
    topRight.style.display  = 'flex';
    bottombar.style.display = 'flex';
    btnCapture.style.display = 'flex';
    loop();
  }).catch(showErr);
}

function showErr(e) {
  document.getElementById('screen-start').style.display = 'none';
  document.getElementById('screen-err').style.display   = 'flex';
  document.getElementById('err-detail').textContent = (e?.name||'')+': '+(e?.message||'');
}

// ── Draw ─────────────────────────────────────────────────────
function loop() {
  const dr = dpr();
  canvas.width  = window.innerWidth  * dr;
  canvas.height = window.innerHeight * dr;
  canvas.style.width  = window.innerWidth  + 'px';
  canvas.style.height = window.innerHeight + 'px';
  ctx.setTransform(dr, 0, 0, dr, 0, 0);
  draw();
  requestAnimationFrame(loop);
}

function draw() {
  const W = window.innerWidth, H = window.innerHeight;
  ctx.clearRect(0, 0, W, H);

  const p      = PALLETS[currentKey];
  const CUT_W  = p.W - p.W_TOP;
  const CUT_H  = p.H - p.H_CORNER;
  const ASPECT = p.W / p.H;
  const ph = H * scale, pw = ph * ASPECT;
  const cx = W/2 + posX*W, cy = H/2 + posY*H;
  const bx = cx - pw/2,    by = cy - ph/2;

  const poly = getPoly(currentKey, flipped);
  const pts  = poly.map(([rx,ry]) => [bx+rx*pw, by+ry*ph]);

  // hide contour during calibration
  if (calibMode === 'off') {
    // fill
    ctx.beginPath();
    pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.closePath();
    ctx.fillStyle = 'rgba(0,229,255,0.07)'; ctx.fill();

    // border
    ctx.beginPath();
    pts.forEach(([x,y],i) => i===0 ? ctx.moveTo(x,y) : ctx.lineTo(x,y));
    ctx.closePath();
    ctx.strokeStyle='#00e5ff'; ctx.lineWidth=3;
    ctx.setLineDash([14,9]); ctx.stroke(); ctx.setLineDash([]);

    // dots
    pts.forEach(([x,y]) => {
      ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2);
      ctx.fillStyle='#00e5ff'; ctx.fill();
      ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
    });

    // labels
    const shortTopY = by + (CUT_H/p.H)*ph;
    const shortMidY = (shortTopY + by + ph) / 2;
    // cut side label (H_CORNER)
    const cutSideX  = flipped ? bx-14 : bx+pw+14;
    const cutAlign  = flipped ? 'right' : 'left';
    lbl(cutSideX, shortMidY, p.H_CORNER+' cm', cutAlign);
    // straight side label (full height p.H), centred on full height
    const straightSideX     = flipped ? bx+pw+14 : bx-14;
    const straightSideAlign = flipped ? 'left' : 'right';
    lbl(straightSideX, cy, p.H+' cm', straightSideAlign);
    // bottom width
    lbl(cx, by+ph+18, p.W+' cm', 'center');
    // top width
    const topX1 = flipped ? bx+(CUT_W/p.W)*pw : bx;
    const topX2 = flipped ? bx+pw             : bx+(1-CUT_W/p.W)*pw;
    lbl((topX1+topX2)/2, by-14, p.W_TOP+' cm', 'center');
  }

  // calibration overlay
  if (calibMode === 'placing' && pt1 && pt2) drawCalib();
}

function drawCalib() {
  const len = Math.hypot(pt2.x-pt1.x, pt2.y-pt1.y).toFixed(0);

  // line
  ctx.beginPath(); ctx.moveTo(pt1.x, pt1.y); ctx.lineTo(pt2.x, pt2.y);
  ctx.strokeStyle='#ffdd00'; ctx.lineWidth=2.5;
  ctx.setLineDash([8,5]); ctx.stroke(); ctx.setLineDash([]);

  // end ticks
  [pt1, pt2].forEach(pt => {
    const isH = Math.abs(pt2.y - pt1.y) < 2;
    ctx.save(); ctx.translate(pt.x, pt.y);
    ctx.beginPath();
    if (isH) { ctx.moveTo(0,-10); ctx.lineTo(0,10); }
    else      { ctx.moveTo(-10,0); ctx.lineTo(10,0); }
    ctx.strokeStyle='#ffdd00'; ctx.lineWidth=2; ctx.stroke();
    ctx.restore();
  });

  // draggable dots
  [pt1, pt2].forEach(pt => {
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 14, 0, Math.PI*2);
    ctx.fillStyle='rgba(255,220,0,0.2)'; ctx.fill();
    ctx.beginPath(); ctx.arc(pt.x, pt.y, 8, 0, Math.PI*2);
    ctx.fillStyle='#ffdd00'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
  });

}

function capture() {
  // flash effect
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 120);

  // composite video + canvas overlay
  const W = canvas.width, H = canvas.height;
  const comp = document.createElement('canvas');
  comp.width = W; comp.height = H;
  const c = comp.getContext('2d');
  c.drawImage(video, 0, 0, W, H);
  c.drawImage(canvas, 0, 0, W, H);

  // show preview for long-press save
  previewImg.src = comp.toDataURL('image/jpeg', 0.92);
  photoPreview.style.display = 'flex';
}

function closePreview() {
  photoPreview.style.display = 'none';
}

function lbl(x,y,text,align) {
  ctx.save();
  ctx.font='bold 13px -apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
  ctx.fillText(text,x,y);
  ctx.restore();
}
</script>
</body>
</html>
