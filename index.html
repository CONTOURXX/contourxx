<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="貨盤檢查">
<title>貨盤檢查</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; }

video { position:fixed; inset:0; width:100%; height:100%; object-fit:cover; z-index:1; }
#canvas { position:fixed; inset:0; width:100%; height:100%; z-index:2; pointer-events:none; }

/* Start screen */
#screen-start {
  position:fixed; inset:0; z-index:20; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; padding:32px;
}
#screen-start h1 { color:#fff; font-size:22px; font-weight:700; }
#screen-start p  { color:#666; font-size:14px; text-align:center; line-height:1.6; }
.btn-main {
  padding:15px 48px; border-radius:50px;
  border:2px solid #00e5ff; background:rgba(0,229,255,0.12);
  color:#00e5ff; font-size:16px; font-weight:700;
  cursor:pointer; -webkit-appearance:none;
}
.btn-main:active { background:rgba(0,229,255,0.28); }

/* Error screen */
#screen-err {
  position:fixed; inset:0; z-index:20; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  padding:32px; text-align:center;
}
#screen-err h2 { color:#ff5555; font-size:18px; }
#screen-err p  { color:#888; font-size:13px; line-height:1.7; }

/* Flip button - top right */
#btn-flip {
  position:fixed; right:16px;
  top:calc(env(safe-area-inset-top,0px) + 10px);
  z-index:10; display:none;
  width:44px; height:44px; border-radius:12px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
  cursor:pointer; font-size:22px; color:#fff;
  -webkit-appearance:none;
}
#btn-flip:active { background:rgba(0,229,255,0.2); }

/* Bottom bar - pallet selector */
#bottombar {
  position:fixed; bottom:0; left:0; right:0;
  z-index:10; display:none;
  justify-content:center; align-items:center; gap:10px;
  padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 12px);
  background:linear-gradient(transparent, rgba(0,0,0,0.7) 40%);
}
.ptype-btn {
  padding:10px 28px; border-radius:50px;
  border:1.5px solid rgba(255,255,255,0.2);
  background:rgba(0,0,0,0.55);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  color:rgba(255,255,255,0.5); font-size:14px; font-weight:700;
  cursor:pointer; -webkit-appearance:none;
  transition:all 0.15s;
}
.ptype-btn.active {
  border-color:#00e5ff; color:#00e5ff;
  background:rgba(0,229,255,0.15);
}
.ptype-btn:active { transform:scale(0.96); }
</style>
</head>
<body>

<div id="screen-start">
  <h1>✈️ 貨盤輪廓檢查</h1>
  <p>N118 / Q7 貨盤輪廓對位工具</p>
  <button class="btn-main" onclick="startCamera()">開啟相機</button>
</div>

<div id="screen-err">
  <h2>⚠️ 無法開啟相機</h2>
  <p>請確認 Safari 已允許相機權限<br>設定 → Safari → 相機 → 允許</p>
  <p id="err-detail" style="color:#555;font-size:12px;"></p>
  <button class="btn-main" onclick="location.reload()">重試</button>
</div>

<video id="video" autoplay playsinline muted webkit-playsinline></video>
<canvas id="canvas"></canvas>

<button id="btn-flip" onclick="flipContour()">⇄</button>

<div id="bottombar">
  <button class="ptype-btn active" onclick="selectPallet('N118')">N118</button>
  <button class="ptype-btn"        onclick="selectPallet('Q7')">Q7</button>
  <button class="ptype-btn"        onclick="selectPallet('P116')">P116</button>
</div>

<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const btnFlip  = document.getElementById('btn-flip');
const bottombar= document.getElementById('bottombar');

const PALLETS = {
  N118: { W:244, H:300, H_CORNER:190, W_TOP:120 },
  Q7:   { W:244, H:300, H_CORNER:244, W_TOP:179 },
  P116: { W:244, H:295, H_CORNER:130, W_TOP:105 },
};

let scale      = 0.50;
let posX       = 0;
let posY       = 0;
let flipped    = true;
let currentKey = 'N118';

function getPoly(key, flipped) {
  const p = PALLETS[key];
  const rCutW = (p.W - p.W_TOP) / p.W;
  const rCutH = (p.H - p.H_CORNER) / p.H;
  const poly = [
    [0,        1],
    [1,        1],
    [1,        rCutH],
    [1-rCutW,  0],
    [0,        0],
  ];
  if (flipped) return poly.map(([rx,ry]) => [1-rx, ry]);
  return poly;
}

function selectPallet(key) {
  currentKey = key;
  document.querySelectorAll('.ptype-btn').forEach(b => {
    b.classList.toggle('active', b.textContent === key);
  });
}

function flipContour() { flipped = !flipped; }

// Touch gestures
let touches  = {};
let lastDist = null;
let dragging = false;

canvas.style.pointerEvents = 'auto';

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => touches[t.identifier]={x:t.clientX,y:t.clientY});
  const ids = Object.keys(touches);
  if(ids.length===2){ lastDist=dist2(touches[ids[0]],touches[ids[1]]); dragging=false; }
  else { lastDist=null; dragging=true; }
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const prev={};
  Object.keys(touches).forEach(k=>prev[k]={...touches[k]});
  Array.from(e.changedTouches).forEach(t => touches[t.identifier]={x:t.clientX,y:t.clientY});
  const ids=Object.keys(touches);
  if(ids.length===2){
    const d=dist2(touches[ids[0]],touches[ids[1]]);
    if(lastDist){ scale*=d/lastDist; scale=Math.max(0.12,Math.min(1.8,scale)); }
    lastDist=d; dragging=false;
  } else if(ids.length===1 && dragging){
    const id=ids[0];
    const dx=(touches[id].x-(prev[id]?.x||touches[id].x))/window.innerWidth;
    const dy=(touches[id].y-(prev[id]?.y||touches[id].y))/window.innerHeight;
    posX=Math.max(-0.4,Math.min(0.4,posX+dx));
    posY=Math.max(-0.4,Math.min(0.4,posY+dy));
  }
},{passive:false});

canvas.addEventListener('touchend', e=>{
  Array.from(e.changedTouches).forEach(t=>delete touches[t.identifier]);
  if(Object.keys(touches).length<2) lastDist=null;
},{passive:false});

function dist2(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

// Camera
async function startCamera(){
  const tries=[
    {video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false},
    {video:{facingMode:'environment'},audio:false},
    {video:true,audio:false}
  ];
  let stream=null;
  for(const c of tries){
    try{ stream=await navigator.mediaDevices.getUserMedia(c); break; }
    catch(e){ if(c===tries[tries.length-1]){ showErr(e); return; } }
  }
  video.srcObject=stream;
  video.onloadedmetadata=()=>video.play().then(()=>{
    document.getElementById('screen-start').style.display='none';
    btnFlip.style.display='flex';
    bottombar.style.display='flex';
    loop();
  }).catch(showErr);
}

function showErr(e){
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-err').style.display='flex';
  document.getElementById('err-detail').textContent=(e?.name||'')+': '+(e?.message||'');
}

// Draw
function loop(){
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
  draw();
  requestAnimationFrame(loop);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const W=canvas.width, H=canvas.height;
  const p=PALLETS[currentKey];
  const CUT_W=p.W-p.W_TOP;
  const CUT_H=p.H-p.H_CORNER;
  const ASPECT=p.W/p.H;

  const ph=H*scale;
  const pw=ph*ASPECT;
  const cx=W/2+posX*W;
  const cy=H/2+posY*H;
  const bx=cx-pw/2, by=cy-ph/2;

  const poly=getPoly(currentKey, flipped);
  const pts=poly.map(([rx,ry])=>[bx+rx*pw, by+ry*ph]);

  // fill
  ctx.beginPath();
  pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.closePath();
  ctx.fillStyle='rgba(0,229,255,0.07)'; ctx.fill();

  // dashed border
  ctx.beginPath();
  pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.closePath();
  ctx.strokeStyle='#00e5ff'; ctx.lineWidth=3;
  ctx.setLineDash([14,9]); ctx.stroke(); ctx.setLineDash([]);

  // corner dots
  pts.forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2);
    ctx.fillStyle='#00e5ff'; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
  });

  // H_CORNER label: on the cut side, midpoint of short vertical edge
  // short vertical edge: from bottom of cut-side to where slant begins
  const shortTopY = by + (CUT_H/p.H)*ph;  // y where slant starts (top)
  const shortBotY = by + ph;               // y at bottom
  const shortMidY = (shortTopY + shortBotY) / 2;
  // cut side: flipped=true → cut on left (bx), flipped=false → cut on right (bx+pw)
  const cutSideX   = flipped ? bx-14    : bx+pw+14;
  const cutSideAlign = flipped ? 'right' : 'left';
  lbl(cutSideX, shortMidY, p.H_CORNER+' cm', cutSideAlign);

  // W label: bottom centre
  lbl(cx, by+ph+18, p.W+' cm', 'center');

  // W_TOP label: centre of top edge
  const topX1 = flipped ? bx+(CUT_W/p.W)*pw : bx;
  const topX2 = flipped ? bx+pw             : bx+(1-CUT_W/p.W)*pw;
  lbl((topX1+topX2)/2, by-14, p.W_TOP+' cm', 'center');
}

function lbl(x,y,text,align){
  ctx.save();
  ctx.font='bold 13px -apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
  ctx.fillText(text,x,y);
  ctx.restore();
}
</script>
</body>
</html>
