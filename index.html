<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="Contourxx">
<title>Contourxx</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; }

/* ── Full screen camera ── */
video {
  position:fixed; inset:0;
  width:100%; height:100%; object-fit:cover; z-index:1;
}
#canvas {
  position:fixed; inset:0;
  width:100%; height:100%; z-index:2;
}

/* ── Pallet scroll capsule ── */
#pallet-capsule {
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 110px);
  left:50%; transform:translateX(-50%);
  z-index:10; display:none;
  background:rgba(0,0,0,0.45);
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
  border-radius:50px;
  border:0.5px solid rgba(255,255,255,0.15);
  overflow:hidden;
  height:34px;
  max-width:70vw;
}
#pallet-scroll {
  display:flex; align-items:center;
  overflow-x:auto; scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  height:100%;
  padding:0 44px;
  gap:0;
}
#pallet-scroll::-webkit-scrollbar { display:none; }

.pscroll-item {
  scroll-snap-align:center; flex-shrink:0;
  padding:0 14px; height:34px;
  display:flex; align-items:center;
  font-size:12px; font-weight:600;
  color:rgba(255,255,255,0.4);
  cursor:pointer; white-space:nowrap;
  transition:all 0.2s;
}
.pscroll-item.active {
  color:#fff; font-size:14px; font-weight:700;
}

/* centre tick marks */
#pallet-capsule::before,
#pallet-capsule::after {
  content:'';
  position:absolute; top:50%; transform:translateY(-50%);
  width:1px; height:14px;
  background:rgba(255,255,255,0.25);
  pointer-events:none; z-index:3;
}
#pallet-capsule::before { left:50%; margin-left:-14px; }
#pallet-capsule::after  { left:50%; margin-left:14px; }

/* ── Shutter row ── */
#shutter-row {
  position:fixed;
  bottom:calc(env(safe-area-inset-bottom,0px) + 28px);
  left:0; right:0;
  z-index:10; display:none;
  align-items:center; justify-content:center;
}

#btn-capture {
  width:62px; height:62px; border-radius:50%;
  background:transparent; border:3px solid #fff;
  cursor:pointer; -webkit-appearance:none;
  display:flex; align-items:center; justify-content:center;
  position:relative; transition:transform 0.1s;
  flex-shrink:0;
}
#btn-capture::after {
  content:''; width:52px; height:52px; border-radius:50%; background:#fff;
  transition:transform 0.1s;
}
#btn-capture:active { transform:scale(0.93); }
#btn-capture:active::after { transform:scale(0.88); }

#btn-calib-confirm {
  width:62px; height:62px; border-radius:50%;
  background:rgba(255,220,0,0.15); border:3px solid #ffdd00;
  cursor:pointer; -webkit-appearance:none;
  display:none; align-items:center; justify-content:center;
  font-size:28px; color:#ffdd00; transition:transform 0.1s;
  flex-shrink:0;
}
#btn-calib-confirm:active { transform:scale(0.93); }

#btn-flip {
  position:absolute; right:calc(50% - 80px); 
  width:44px; height:44px; border-radius:50%;
  background:rgba(0,0,0,0.35);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  display:none; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; color:#fff;
  -webkit-appearance:none;
}
#btn-flip:active { background:rgba(255,255,255,0.15); }

/* ── Top right ── */
#top-right {
  position:fixed; right:16px;
  top:calc(env(safe-area-inset-top,0px) + 10px);
  z-index:10; display:none;
  flex-direction:column; gap:8px;
}
.icon-btn {
  width:44px; height:44px; border-radius:12px;
  background:rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; color:#fff;
  -webkit-appearance:none;
}
.icon-btn:active { background:rgba(0,229,255,0.2); }
.icon-btn.on { border-color:#00e5ff; color:#00e5ff; background:rgba(0,229,255,0.15); }

/* ── Calib prompt ── */
#calib-prompt {
  position:fixed; top:calc(env(safe-area-inset-top,0px) + 10px);
  left:50%; transform:translateX(-50%);
  z-index:10; display:none;
  padding:8px 20px; border-radius:20px;
  background:rgba(0,0,0,0.7);
  border:1px solid rgba(255,220,0,0.5);
  color:#ffdd00; font-size:13px; font-weight:600;
  white-space:nowrap; pointer-events:none;
}

/* ── Length input overlay ── */
#len-overlay {
  position:fixed; inset:0; z-index:30;
  background:rgba(0,0,0,0.55);
  display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);
}
#len-card {
  background:rgba(10,12,20,0.95);
  border:1px solid rgba(255,220,0,0.25);
  border-radius:24px; padding:28px 28px 22px;
  display:flex; flex-direction:column; gap:18px; align-items:center;
  min-width:260px;
  box-shadow:0 12px 48px rgba(0,0,0,0.7);
}
#len-title { color:rgba(255,220,0,0.7); font-size:11px; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; }
#len-input-wrap { position:relative; width:100%; }
#len-input {
  width:100%; padding:14px 48px 14px 16px;
  border-radius:14px;
  border:1.5px solid rgba(255,220,0,0.3);
  background:rgba(255,255,255,0.06);
  color:#fff; font-size:28px; font-weight:700;
  text-align:center; outline:none; -webkit-appearance:none;
  transition:border-color 0.15s, background 0.15s;
}
#len-input:focus { border-color:#ffdd00; background:rgba(255,220,0,0.06); }
#len-input::placeholder { color:rgba(255,255,255,0.18); }
#len-unit { position:absolute; right:14px; top:50%; transform:translateY(-50%); color:rgba(255,220,0,0.55); font-size:14px; font-weight:600; pointer-events:none; }
#len-btns { display:flex; gap:10px; width:100%; }
#len-cancel, #len-ok {
  flex:1; padding:13px; border-radius:13px;
  font-size:14px; font-weight:700;
  cursor:pointer; -webkit-appearance:none; transition:background 0.15s;
}
#len-cancel { border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.4); }
#len-cancel:active { background:rgba(255,255,255,0.1); }
#len-ok { border:1.5px solid rgba(255,220,0,0.5); background:rgba(255,220,0,0.15); color:#ffdd00; }
#len-ok:active { background:rgba(255,220,0,0.28); }

/* ── Flash ── */
#flash { position:fixed; inset:0; z-index:50; background:#fff; opacity:0; pointer-events:none; transition:opacity 0.06s; }

/* ── Photo preview ── */
#photo-preview {
  position:fixed; inset:0; z-index:40;
  background:rgba(0,0,0,0.88);
  display:none; align-items:center; justify-content:center;
  flex-direction:column; gap:14px;
}
#photo-preview img { max-width:92vw; max-height:78vh; border-radius:10px; box-shadow:0 0 40px rgba(0,0,0,0.8); }
#photo-preview p { color:rgba(255,255,255,0.4); font-size:12px; }

/* ── Start / Error ── */
#screen-start {
  position:fixed; inset:0; z-index:20; background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; padding:32px;
}
#screen-start h1 { color:#fff; font-size:22px; font-weight:700; }
.btn-main {
  padding:15px 48px; border-radius:50px;
  border:2px solid #00e5ff; background:rgba(0,229,255,0.12);
  color:#00e5ff; font-size:16px; font-weight:700;
  cursor:pointer; -webkit-appearance:none;
}
.btn-main:active { background:rgba(0,229,255,0.28); }
#screen-err {
  position:fixed; inset:0; z-index:20; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  padding:32px; text-align:center;
}
#screen-err h2 { color:#ff5555; font-size:18px; }
</style>
</head>
<body>

<div id="screen-start">
  <h1>Contourxx</h1>
  <button class="btn-main" onclick="startCamera()">開啟相機</button>
</div>
<div id="screen-err">
  <h2>⚠️ 無法開啟相機</h2>
  <p id="err-detail" style="color:#555;font-size:12px;margin-top:8px;"></p>
  <button class="btn-main" onclick="location.reload()">重試</button>
</div>

<div id="flash"></div>
<div id="photo-preview" onclick="closePreview()">
  <img id="preview-img" src="" alt="">
  <p>長按圖片可儲存到相簿　點擊任意處關閉</p>
</div>
<div id="len-overlay">
  <div id="len-card">
    <div id="len-title">輸入線段實際長度</div>
    <div id="len-input-wrap">
      <input id="len-input" type="number" inputmode="numeric" pattern="[0-9]*" placeholder="0" min="1" max="9999">
      <span id="len-unit">cm</span>
    </div>
    <div id="len-btns">
      <button id="len-cancel" onclick="cancelCalib()">取消</button>
      <button id="len-ok"     onclick="confirmCalib()">確認</button>
    </div>
  </div>
</div>

<video id="video" autoplay playsinline muted webkit-playsinline></video>
<canvas id="canvas"></canvas>
<div id="calib-prompt"></div>

<div id="top-right">
  <button class="icon-btn" id="btn-calib" onclick="toggleCalib()">⊕</button>
</div>

<div id="pallet-capsule">
  <div id="pallet-scroll"></div>
</div>

<div id="shutter-row">
  <button id="btn-capture"       onclick="capture()"></button>
  <button id="btn-calib-confirm" onclick="finishCalibLine()">✓</button>
  <button id="btn-flip"          onclick="flipContour()">⇄</button>
</div>

<script>
const video        = document.getElementById('video');
const canvas       = document.getElementById('canvas');
const ctx          = canvas.getContext('2d');
const topRight     = document.getElementById('top-right');
const palletCapsule= document.getElementById('pallet-capsule');
const shutterRow   = document.getElementById('shutter-row');
const calibPrompt  = document.getElementById('calib-prompt');
const lenOverlay   = document.getElementById('len-overlay');
const lenInput     = document.getElementById('len-input');
const btnCalib     = document.getElementById('btn-calib');
const btnCapture   = document.getElementById('btn-capture');
const btnCalibConf = document.getElementById('btn-calib-confirm');
const btnFlip      = document.getElementById('btn-flip');
const flash        = document.getElementById('flash');
const photoPreview = document.getElementById('photo-preview');
const previewImg   = document.getElementById('preview-img');
const palletScroll = document.getElementById('pallet-scroll');

const PALLETS = {
  J2: { W:244, H:300, H_CORNER:190, W_TOP:120 },
  J1: { W:244, H:295, H_CORNER:130, W_TOP:105 },
  Q7: { W:244, H:300, H_CORNER:244, W_TOP:179 },
};
const PALLET_KEYS = ['J1', 'J2', 'Q7'];

let scale      = 0.42;
let posX = 0, posY = 0;
let flipped    = true;
let currentKey = 'J2';
let calibMode  = 'off';
let pt1 = null, pt2 = null;
let draggingPt = null;

function dpr() { return window.devicePixelRatio || 1; }

// ── Pallet scroll ────────────────────────────────────────────
function buildScrollSelector() {
  palletScroll.innerHTML = '';
  PALLET_KEYS.forEach(key => {
    const el = document.createElement('div');
    el.className = 'pscroll-item' + (key === currentKey ? ' active' : '');
    el.textContent = key;
    el.dataset.key = key;
    palletScroll.appendChild(el);
  });
  setTimeout(() => scrollToActive(false), 50);
}

function scrollToActive(smooth = true) {
  const items  = palletScroll.querySelectorAll('.pscroll-item');
  const idx    = PALLET_KEYS.indexOf(currentKey);
  const item   = items[idx];
  if (!item) return;
  const wrapW  = palletCapsule.offsetWidth;
  const itemCx = item.offsetLeft + item.offsetWidth / 2;
  palletScroll.scrollTo({ left: itemCx - wrapW / 2, behavior: smooth ? 'smooth' : 'instant' });
}

function selectPallet(key) {
  currentKey = key;
  palletScroll.querySelectorAll('.pscroll-item').forEach(el =>
    el.classList.toggle('active', el.dataset.key === key));
}

let scrollTimer = null;
palletScroll.addEventListener('scroll', () => {
  clearTimeout(scrollTimer);
  scrollTimer = setTimeout(() => {
    const wrapW  = palletCapsule.offsetWidth;
    const centre = palletScroll.scrollLeft + wrapW / 2;
    let best = null, bestDist = Infinity;
    palletScroll.querySelectorAll('.pscroll-item').forEach(el => {
      const cx = el.offsetLeft + el.offsetWidth / 2;
      const d  = Math.abs(cx - centre);
      if (d < bestDist) { bestDist = d; best = el; }
    });
    if (best) selectPallet(best.dataset.key);
  }, 80);
});

palletScroll.addEventListener('click', e => {
  const item = e.target.closest('.pscroll-item');
  if (!item) return;
  selectPallet(item.dataset.key);
  scrollToActive();
});

// ── Pallet shape ─────────────────────────────────────────────
function getPoly(key, flipped) {
  const p = PALLETS[key];
  const rCutW = (p.W - p.W_TOP) / p.W;
  const rCutH = (p.H - p.H_CORNER) / p.H;
  const poly = [[0,1],[1,1],[1,rCutH],[1-rCutW,0],[0,0]];
  if (flipped) return poly.map(([rx,ry]) => [1-rx, ry]);
  return poly;
}

function flipContour() { flipped = !flipped; }

function snapPoint(base, raw) {
  const dx = raw.x - base.x, dy = raw.y - base.y;
  const angle = Math.abs(Math.atan2(dy, dx) * 180 / Math.PI);
  const len = Math.hypot(dx, dy);
  if (angle < 5 || angle > 175) return {x: base.x+(dx<0?-len:len), y: base.y};
  if (angle > 85 && angle < 95) return {x: base.x, y: base.y+(dy<0?-len:len)};
  return raw;
}

// ── Calibration ──────────────────────────────────────────────
function toggleCalib() {
  if (calibMode !== 'off') { cancelCalib(); return; }
  const W = window.innerWidth, H = window.innerHeight;
  pt1 = {x: W*0.5, y: H*0.35};
  pt2 = {x: W*0.5, y: H*0.65};
  calibMode = 'placing';
  btnCalib.classList.add('on');
  calibPrompt.style.display  = 'block';
  calibPrompt.textContent    = '拖移兩端點對齊已知線段';
  btnCapture.style.display   = 'none';
  btnCalibConf.style.display = 'flex';
}

function finishCalibLine() {
  calibMode = 'input';
  calibPrompt.style.display  = 'none';
  btnCalibConf.style.display = 'none';
  lenOverlay.style.display   = 'flex';
  setTimeout(() => lenInput.focus(), 150);
}

function cancelCalib() {
  calibMode = 'off'; pt1 = pt2 = null; draggingPt = null;
  btnCalib.classList.remove('on');
  calibPrompt.style.display  = 'none';
  btnCalibConf.style.display = 'none';
  lenOverlay.style.display   = 'none';
  lenInput.value = '';
  btnCapture.style.display   = 'flex';
}

function confirmCalib() {
  const cm = parseFloat(lenInput.value);
  if (!cm || cm <= 0) { lenInput.focus(); return; }
  const pixLen  = Math.hypot(pt2.x - pt1.x, pt2.y - pt1.y);
  const pxPerCm = pixLen / cm;
  scale = (PALLETS[currentKey].H * pxPerCm) / window.innerHeight;
  cancelCalib();
}

// ── Touch ────────────────────────────────────────────────────
let touches  = {};
let lastDist = null;
let dragContour = false;
const HIT = 36;

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t =>
    touches[t.identifier] = {x:t.clientX, y:t.clientY});
  const ids = Object.keys(touches);
  if (calibMode === 'placing') {
    const t0 = touches[ids[0]];
    if (pt1 && dist2(t0,pt1)<HIT) { draggingPt=1; return; }
    if (pt2 && dist2(t0,pt2)<HIT) { draggingPt=2; return; }
    draggingPt=null; return;
  }
  draggingPt=null;
  if (ids.length===2) { lastDist=dist2(touches[ids[0]],touches[ids[1]]); dragContour=false; }
  else { lastDist=null; dragContour=true; }
},{passive:false});

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const prev={};
  Object.keys(touches).forEach(k=>prev[k]={...touches[k]});
  Array.from(e.changedTouches).forEach(t=>
    touches[t.identifier]={x:t.clientX,y:t.clientY});
  const ids=Object.keys(touches);
  if (calibMode==='placing' && draggingPt) {
    const raw=touches[ids[0]];
    const base=draggingPt===1?pt2:pt1;
    const snapped=base?snapPoint(base,raw):raw;
    if(draggingPt===1)pt1=snapped;else pt2=snapped;
    return;
  }
  if (ids.length===2) {
    const d=dist2(touches[ids[0]],touches[ids[1]]);
    if(lastDist){scale*=d/lastDist;scale=Math.max(0.12,Math.min(1.8,scale));}
    lastDist=d;dragContour=false;
  } else if(ids.length===1&&dragContour){
    const id=ids[0];
    const dx=(touches[id].x-(prev[id]?.x||touches[id].x))/window.innerWidth;
    const dy=(touches[id].y-(prev[id]?.y||touches[id].y))/window.innerHeight;
    posX=Math.max(-0.4,Math.min(0.4,posX+dx));
    posY=Math.max(-0.4,Math.min(0.4,posY+dy));
  }
},{passive:false});

canvas.addEventListener('touchend', e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t=>delete touches[t.identifier]);
  if(Object.keys(touches).length<2)lastDist=null;
  draggingPt=null;
},{passive:false});

function dist2(a,b){return Math.hypot(a.x-b.x,a.y-b.y);}

// ── Camera ───────────────────────────────────────────────────
async function startCamera(){
  const tries=[
    {video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false},
    {video:{facingMode:'environment'},audio:false},
    {video:true,audio:false}
  ];
  let stream=null;
  for(const c of tries){
    try{stream=await navigator.mediaDevices.getUserMedia(c);break;}
    catch(e){if(c===tries[tries.length-1]){showErr(e);return;}}
  }
  video.srcObject=stream;
  video.onloadedmetadata=()=>video.play().then(()=>{
    document.getElementById('screen-start').style.display='none';
    topRight.style.display     ='flex';
    palletCapsule.style.display='block';
    shutterRow.style.display   ='flex';
    btnFlip.style.display      ='flex';
    buildScrollSelector();
    loop();
  }).catch(showErr);
}

function showErr(e){
  document.getElementById('screen-start').style.display='none';
  document.getElementById('screen-err').style.display='flex';
  document.getElementById('err-detail').textContent=(e?.name||'')+': '+(e?.message||'');
}

// ── Draw ─────────────────────────────────────────────────────
function loop(){
  const dr=dpr();
  canvas.width =window.innerWidth *dr;
  canvas.height=window.innerHeight*dr;
  canvas.style.width =window.innerWidth +'px';
  canvas.style.height=window.innerHeight+'px';
  ctx.setTransform(dr,0,0,dr,0,0);
  draw();
  requestAnimationFrame(loop);
}

function draw(){
  const W=window.innerWidth, H=window.innerHeight;
  ctx.clearRect(0,0,W,H);

  if(calibMode!=='placing'){
    const p=PALLETS[currentKey];
    const CUT_W=p.W-p.W_TOP, CUT_H=p.H-p.H_CORNER;
    const ASPECT=p.W/p.H;
    const ph=H*scale, pw=ph*ASPECT;
    const cx=W/2+posX*W, cy=H/2+posY*H;
    const bx=cx-pw/2, by=cy-ph/2;
    const poly=getPoly(currentKey,flipped);
    const pts=poly.map(([rx,ry])=>[bx+rx*pw,by+ry*ph]);

    ctx.beginPath();
    pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.closePath();
    ctx.fillStyle='rgba(0,229,255,0.07)';ctx.fill();

    ctx.beginPath();
    pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
    ctx.closePath();
    ctx.strokeStyle='#00e5ff';ctx.lineWidth=3;
    ctx.setLineDash([14,9]);ctx.stroke();ctx.setLineDash([]);

    pts.forEach(([x,y])=>{
      ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);
      ctx.fillStyle='#00e5ff';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.stroke();
    });

    const shortTopY=by+(CUT_H/p.H)*ph;
    const shortMidY=(shortTopY+by+ph)/2;
    const cutSideX=flipped?bx-14:bx+pw+14;
    const cutAlign=flipped?'right':'left';
    lbl(cutSideX,shortMidY,p.H_CORNER+' cm',cutAlign);
    const straightX=flipped?bx+pw+14:bx-14;
    const straightAlign=flipped?'left':'right';
    lbl(straightX,cy,p.H+' cm',straightAlign);
    lbl(cx,by+ph+18,p.W+' cm','center');
    const topX1=flipped?bx+(CUT_W/p.W)*pw:bx;
    const topX2=flipped?bx+pw:bx+(1-CUT_W/p.W)*pw;
    lbl((topX1+topX2)/2,by-14,p.W_TOP+' cm','center');
  }

  if(calibMode==='placing'&&pt1&&pt2)drawCalib();
}

function drawCalib(){
  ctx.beginPath();ctx.moveTo(pt1.x,pt1.y);ctx.lineTo(pt2.x,pt2.y);
  ctx.strokeStyle='#ffdd00';ctx.lineWidth=2.5;
  ctx.setLineDash([8,5]);ctx.stroke();ctx.setLineDash([]);
  const isH=Math.abs(pt2.y-pt1.y)<2;
  [pt1,pt2].forEach(pt=>{
    ctx.save();ctx.translate(pt.x,pt.y);
    ctx.beginPath();
    if(isH){ctx.moveTo(0,-10);ctx.lineTo(0,10);}
    else{ctx.moveTo(-10,0);ctx.lineTo(10,0);}
    ctx.strokeStyle='#ffdd00';ctx.lineWidth=2;ctx.stroke();ctx.restore();
    ctx.beginPath();ctx.arc(pt.x,pt.y,16,0,Math.PI*2);
    ctx.fillStyle='rgba(255,220,0,0.18)';ctx.fill();
    ctx.beginPath();ctx.arc(pt.x,pt.y,8,0,Math.PI*2);
    ctx.fillStyle='#ffdd00';ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
  });
}

function lbl(x,y,text,align){
  ctx.save();
  ctx.font='bold 13px -apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.textAlign=align;ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.9)';ctx.shadowBlur=8;
  ctx.fillText(text,x,y);
  ctx.restore();
}

// ── Capture ──────────────────────────────────────────────────
function capture(){
  flash.style.opacity='1';
  setTimeout(()=>flash.style.opacity='0',120);
  const W=canvas.width,H=canvas.height;
  const comp=document.createElement('canvas');
  comp.width=W;comp.height=H;
  const c=comp.getContext('2d');
  c.drawImage(video,0,0,W,H);
  c.drawImage(canvas,0,0,W,H);
  previewImg.src=comp.toDataURL('image/jpeg',0.92);
  photoPreview.style.display='flex';
}

function closePreview(){photoPreview.style.display='none';}
</script>
