<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen">
<meta name="apple-mobile-web-app-title" content="貨盤檢查">
<title>貨盤檢查</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family:-apple-system,'Helvetica Neue',sans-serif; }

video {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover; z-index:1;
}
#canvas {
  position:fixed; inset:0;
  width:100%; height:100%;
  z-index:2; pointer-events:none;
}

/* ── Start screen ── */
#screen-start {
  position:fixed; inset:0; z-index:20;
  background:#000;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:24px; padding:32px;
}
#screen-start h1 { color:#fff; font-size:22px; font-weight:700; }
#screen-start p  { color:#666; font-size:14px; text-align:center; line-height:1.6; }
.btn-main {
  padding:15px 48px; border-radius:50px;
  border:2px solid #00e5ff;
  background:rgba(0,229,255,0.12);
  color:#00e5ff; font-size:16px; font-weight:700;
  cursor:pointer; -webkit-appearance:none;
}
.btn-main:active { background:rgba(0,229,255,0.28); }

/* ── Error screen ── */
#screen-err {
  position:fixed; inset:0; z-index:20; background:#000;
  display:none; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  padding:32px; text-align:center;
}
#screen-err h2 { color:#ff5555; font-size:18px; }
#screen-err p  { color:#888; font-size:13px; line-height:1.7; }

/* ── Top bar ── */
#topbar {
  position:fixed; top:env(safe-area-inset-top,0px); left:0; right:0;
  z-index:10; display:none;
  justify-content:center; align-items:center; padding:10px 16px;
  pointer-events:none;
}
#result-badge {
  padding:7px 24px; border-radius:50px;
  font-size:13px; font-weight:700; letter-spacing:0.06em;
  backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
  transition:all 0.25s; pointer-events:auto;
}
.badge-idle { background:rgba(0,0,0,0.5); color:#888; border:1px solid #333; }
.badge-ok   { background:rgba(0,180,80,0.85); color:#fff; border:1px solid rgba(0,255,120,0.4); box-shadow:0 0 16px rgba(0,200,80,0.4); }
.badge-ng   { background:rgba(210,40,40,0.85); color:#fff; border:1px solid rgba(255,80,80,0.4); box-shadow:0 0 16px rgba(220,40,40,0.4); }

/* ── Hint ── */
#hint {
  position:fixed; top:calc(env(safe-area-inset-top,0px) + 52px);
  left:50%; transform:translateX(-50%);
  z-index:10; display:none;
  font-size:11px; color:rgba(255,255,255,0.4);
  white-space:nowrap; pointer-events:none;
}

/* ── Flip button ── */
#btn-flip {
  position:fixed; left:16px;
  top:calc(env(safe-area-inset-top,0px) + 10px);
  z-index:10; display:none;
  width:44px; height:44px; border-radius:12px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
  cursor:pointer; font-size:22px; color:#fff;
  -webkit-appearance:none;
}
#btn-flip:active { background:rgba(0,229,255,0.2); }

/* ── Bottom bar ── */
#bottombar {
  position:fixed; bottom:0; left:0; right:0;
  z-index:10; display:none; flex-direction:column; gap:0;
  padding:12px 20px calc(env(safe-area-inset-bottom,0px) + 12px);
  background:linear-gradient(transparent, rgba(0,0,0,0.75) 30%);
}
.action-row { display:flex; gap:10px; align-items:center; justify-content:center; }

.btn-verdict {
  flex:1; padding:13px 8px; border-radius:14px;
  font-size:14px; font-weight:700;
  cursor:pointer; -webkit-appearance:none;
  transition:all 0.15s; border:1.5px solid;
}
.btn-verdict:active { transform:scale(0.96); }
.btn-ok { background:rgba(0,180,80,0.2); border-color:rgba(0,200,100,0.5); color:#4dffaa; }
.btn-ok.active { background:rgba(0,180,80,0.5); border-color:#00e080; }
.btn-ng { background:rgba(210,40,40,0.2); border-color:rgba(220,60,60,0.5); color:#ff7070; }
.btn-ng.active { background:rgba(210,40,40,0.5); border-color:#ff4444; }

.btn-capture {
  width:58px; height:58px; border-radius:50%;
  background:rgba(255,255,255,0.15); border:3px solid #fff;
  cursor:pointer; -webkit-appearance:none;
  display:flex; align-items:center; justify-content:center; flex-shrink:0;
  transition:all 0.12s;
}
.btn-capture:active { transform:scale(0.92); background:rgba(255,255,255,0.3); }
.btn-capture::after { content:''; width:38px; height:38px; border-radius:50%; background:#fff; }

/* ── Records ── */
#records-btn {
  position:fixed; right:16px;
  bottom:calc(env(safe-area-inset-bottom,0px) + 100px);
  z-index:10; display:none;
  width:44px; height:44px; border-radius:12px;
  background:rgba(0,0,0,0.55);
  border:1px solid rgba(255,255,255,0.2);
  backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
  align-items:center; justify-content:center;
  cursor:pointer; font-size:20px;
}
#records-panel {
  position:fixed; inset:0; z-index:30;
  background:rgba(0,0,0,0.92);
  display:none; flex-direction:column;
  padding:calc(env(safe-area-inset-top,0px)+16px) 16px
          calc(env(safe-area-inset-bottom,0px)+16px);
  gap:12px;
}
#records-panel h2 {
  color:#fff; font-size:18px; font-weight:700;
  display:flex; justify-content:space-between; align-items:center;
}
#records-panel h2 span { font-size:14px; color:#555; font-weight:400; cursor:pointer; }
#records-list { flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
.record-item {
  border-radius:12px; overflow:hidden; border:1px solid #222;
  display:flex; align-items:stretch;
}
.record-item img { width:80px; height:80px; object-fit:cover; flex-shrink:0; }
.record-info { flex:1; padding:10px 12px; display:flex; flex-direction:column; justify-content:center; gap:4px; }
.record-info .r-time { font-size:11px; color:#666; }
.record-info .r-verdict { font-size:13px; font-weight:700; }
.r-ok { color:#4dffaa; } .r-ng { color:#ff7070; } .r-none { color:#888; }
.record-dl { padding:0 14px; background:transparent; border:none; color:#00e5ff; font-size:20px; cursor:pointer; display:flex; align-items:center; }
#no-records { color:#555; font-size:14px; text-align:center; margin-top:60px; }

/* ── Flash ── */
#flash { position:fixed; inset:0; z-index:50; background:#fff; opacity:0; pointer-events:none; transition:opacity 0.08s; }
</style>
</head>
<body>

<div id="screen-start">
  <h1>✈️ 貨盤輪廓檢查</h1>
  <p>N118 PMC 貨盤<br>244 × 300 cm（收角高 190 cm，頂寬 120 cm）</p>
  <button class="btn-main" onclick="startCamera()">開啟相機</button>
</div>

<div id="screen-err">
  <h2>⚠️ 無法開啟相機</h2>
  <p>請確認 Safari 已允許相機權限<br>設定 → Safari → 相機 → 允許</p>
  <p id="err-detail" style="color:#555;font-size:12px;"></p>
  <button class="btn-main" onclick="location.reload()">重試</button>
</div>

<div id="flash"></div>
<video id="video" autoplay playsinline muted webkit-playsinline></video>
<canvas id="canvas"></canvas>

<div id="topbar">
  <div id="result-badge" class="badge-idle">對準貨盤後標記結果</div>
</div>
<div id="hint">🤏 雙指縮放　👆 單指拖移</div>

<button id="btn-flip" onclick="flipContour()">⇄</button>

<div id="bottombar">
  <div class="action-row">
    <button class="btn-verdict btn-ok" id="btn-ok" onclick="setVerdict('ok')">✓ 合格</button>
    <button class="btn-capture" onclick="capture()"></button>
    <button class="btn-verdict btn-ng" id="btn-ng" onclick="setVerdict('ng')">✗ 不合格</button>
  </div>
</div>

<div id="records-btn" onclick="toggleRecords()">📋</div>

<div id="records-panel">
  <h2>檢查紀錄 <span onclick="toggleRecords()">關閉</span></h2>
  <div id="records-list"><p id="no-records">尚無紀錄</p></div>
</div>

<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const ctx      = canvas.getContext('2d');
const topbar   = document.getElementById('topbar');
const hint     = document.getElementById('hint');
const bottombar= document.getElementById('bottombar');
const recBtn   = document.getElementById('records-btn');
const badge    = document.getElementById('result-badge');
const flash    = document.getElementById('flash');
const btnFlip  = document.getElementById('btn-flip');

// ── N118 PMC dimensions (cm)
// total height: 300, width at base: 244, corner starts at: 190 from bottom
// top width: 120  =>  cut width: 244-120 = 124cm, cut height: 300-190 = 110cm
// cut is on the RIGHT side (default), can be flipped to LEFT
const W_BASE = 244, H_TOTAL = 300, H_CORNER = 190, W_TOP = 120;
const CUT_W  = W_BASE - W_TOP;   // 124
const CUT_H  = H_TOTAL - H_CORNER; // 110

// Normalised polygon (right-cut, default)
// Points: bottom-left → bottom-right → top-right-start → top-right-end(top) → top-left
function getPoly(flipped) {
  // rx,ry in 0..1 of bounding box (width=W_BASE, height=H_TOTAL)
  const rCutW = CUT_W / W_BASE;   // 124/244 ≈ 0.508
  const rCutH = CUT_H / H_TOTAL;  // 110/300 ≈ 0.367
  const poly = [
    [0,          1],           // bottom-left
    [1,          1],           // bottom-right
    [1,          rCutH],       // right side up to corner start
    [1 - rCutW,  0],           // top-right (after cut)
    [0,          0],           // top-left
  ];
  if (flipped) {
    // mirror horizontally: rx → 1-rx
    return poly.map(([rx,ry]) => [1-rx, ry]);
  }
  return poly;
}

const ASPECT = W_BASE / H_TOTAL; // 244/300

let scale   = 0.65;  // fraction of screen height
let posX    = 0;
let posY    = 0;
let flipped = false;
let verdict = null;
let records = [];

// ── Touch ──────────────────────────────────────────────────
let touches  = {};
let lastDist = null;
let dragging = false;

canvas.style.pointerEvents = 'auto';

canvas.addEventListener('touchstart', e=>{
  e.preventDefault();
  Array.from(e.changedTouches).forEach(t => touches[t.identifier]={x:t.clientX,y:t.clientY});
  const ids = Object.keys(touches);
  if(ids.length===2){ lastDist=dist2(touches[ids[0]],touches[ids[1]]); dragging=false; }
  else { lastDist=null; dragging=true; }
},{passive:false});

canvas.addEventListener('touchmove', e=>{
  e.preventDefault();
  const prev={};
  Object.keys(touches).forEach(k=>prev[k]={...touches[k]});
  Array.from(e.changedTouches).forEach(t => touches[t.identifier]={x:t.clientX,y:t.clientY});
  const ids=Object.keys(touches);
  if(ids.length===2){
    const d=dist2(touches[ids[0]],touches[ids[1]]);
    if(lastDist){ scale*=d/lastDist; scale=Math.max(0.12,Math.min(1.8,scale)); }
    lastDist=d; dragging=false;
  } else if(ids.length===1 && dragging){
    const id=ids[0];
    const dx=(touches[id].x-(prev[id]?.x||touches[id].x))/window.innerWidth;
    const dy=(touches[id].y-(prev[id]?.y||touches[id].y))/window.innerHeight;
    posX=Math.max(-0.4,Math.min(0.4,posX+dx));
    posY=Math.max(-0.4,Math.min(0.4,posY+dy));
  }
},{passive:false});

canvas.addEventListener('touchend', e=>{
  Array.from(e.changedTouches).forEach(t=>delete touches[t.identifier]);
  if(Object.keys(touches).length<2) lastDist=null;
},{passive:false});

function dist2(a,b){ return Math.hypot(a.x-b.x,a.y-b.y); }

// ── Camera ──────────────────────────────────────────────────
async function startCamera(){
  const tries=[
    {video:{facingMode:{exact:'environment'},width:{ideal:1920},height:{ideal:1080}},audio:false},
    {video:{facingMode:'environment'},audio:false},
    {video:true,audio:false}
  ];
  let stream=null;
  for(const c of tries){
    try{ stream=await navigator.mediaDevices.getUserMedia(c); break; }
    catch(e){ if(c===tries[tries.length-1]){ showErr(e); return; } }
  }
  video.srcObject=stream;
  video.onloadedmetadata=()=>video.play().then(()=>{
    document.getElementById('screen-start').style.display='none';
    topbar.style.display='flex';
    hint.style.display='block';
    bottombar.style.display='flex';
    recBtn.style.display='flex';
    btnFlip.style.display='flex';
    loop();
  }).catch(showErr);
}

function showErr(e){
  document.getElementById('screen-start').style.display='none';
  const s=document.getElementById('screen-err');
  s.style.display='flex';
  document.getElementById('err-detail').textContent=(e?.name||'')+': '+(e?.message||'');
}

// ── Draw ────────────────────────────────────────────────────
function loop(){
  canvas.width =window.innerWidth;
  canvas.height=window.innerHeight;
  draw();
  requestAnimationFrame(loop);
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  const W=canvas.width, H=canvas.height;
  const ph=H*scale;
  const pw=ph*ASPECT;
  const cx=W/2+posX*W;
  const cy=H/2+posY*H;
  const bx=cx-pw/2, by=cy-ph/2;

  const poly=getPoly(flipped);
  const pts=poly.map(([rx,ry])=>[bx+rx*pw, by+ry*ph]);

  const col = verdict==='ok'?'#00e080': verdict==='ng'?'#ff4444':'#00e5ff';
  const fa  = verdict ? 0.12 : 0.07;

  // fill
  ctx.beginPath();
  pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.closePath();
  ctx.fillStyle=rgba(col,fa); ctx.fill();

  // dashed border
  ctx.beginPath();
  pts.forEach(([x,y],i)=>i===0?ctx.moveTo(x,y):ctx.lineTo(x,y));
  ctx.closePath();
  ctx.strokeStyle=col; ctx.lineWidth=3;
  ctx.setLineDash([14,9]); ctx.stroke(); ctx.setLineDash([]);

  // corner dots
  pts.forEach(([x,y])=>{
    ctx.beginPath(); ctx.arc(x,y,6,0,Math.PI*2);
    ctx.fillStyle=col; ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
  });

  // dimension labels
  // 190cm: left side vertical height
  lbl(bx-14, cy+ph*0.15, '190 cm', 'right');
  // 244cm: bottom width
  lbl(cx, by+ph+18, '244 cm', 'center');
  // 120cm: centre of top edge
  // top edge goes from top-left corner to top-right corner of the shape
  const topEdgeX1 = flipped ? bx+( CUT_W/W_BASE)*pw : bx;
  const topEdgeX2 = flipped ? bx+pw                  : bx+(1-CUT_W/W_BASE)*pw;
  lbl((topEdgeX1+topEdgeX2)/2, by-14, '120 cm', 'center');
}

function lbl(x,y,text,align){
  ctx.save();
  ctx.font='bold 13px -apple-system,sans-serif';
  ctx.fillStyle='rgba(255,255,255,0.8)';
  ctx.textAlign=align; ctx.textBaseline='middle';
  ctx.shadowColor='rgba(0,0,0,0.9)'; ctx.shadowBlur=8;
  ctx.fillText(text,x,y);
  ctx.restore();
}

function rgba(hex,a){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${a})`;
}

// ── Flip ────────────────────────────────────────────────────
function flipContour(){ flipped=!flipped; }

// ── Verdict ─────────────────────────────────────────────────
function setVerdict(v){
  verdict=verdict===v?null:v;
  document.getElementById('btn-ok').classList.toggle('active',verdict==='ok');
  document.getElementById('btn-ng').classList.toggle('active',verdict==='ng');
  badge.className='result-badge '+(verdict==='ok'?'badge-ok':verdict==='ng'?'badge-ng':'badge-idle');
  badge.textContent=verdict==='ok'?'✓ 合格':verdict==='ng'?'✗ 不合格':'對準貨盤後標記結果';
}

// ── Capture ─────────────────────────────────────────────────
function capture(){
  flash.style.opacity='1';
  setTimeout(()=>flash.style.opacity='0',120);
  const W=canvas.width,H=canvas.height;
  const comp=document.createElement('canvas');
  comp.width=W; comp.height=H;
  const c=comp.getContext('2d');
  c.drawImage(video,0,0,W,H);
  c.drawImage(canvas,0,0,W,H);

  const now=new Date();
  const ts=now.toLocaleDateString('zh-TW')+' '+now.toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'});
  const vText=verdict==='ok'?'✓ 合格':verdict==='ng'?'✗ 不合格':'未標記';
  const vCol =verdict==='ok'?'#00e080':verdict==='ng'?'#ff4444':'#888';

  c.fillStyle='rgba(0,0,0,0.55)'; c.fillRect(W-210,H-70,205,55);
  c.font='bold 30px -apple-system,sans-serif';
  c.fillStyle=vCol; c.textAlign='right'; c.textBaseline='middle';
  c.fillText(vText,W-16,H-42);
  c.font='500 15px -apple-system,sans-serif';
  c.fillStyle='rgba(255,255,255,0.7)'; c.textAlign='left';
  c.shadowColor='rgba(0,0,0,0.8)'; c.shadowBlur=6;
  c.fillText(ts,16,H-42);

  const dataUrl=comp.toDataURL('image/jpeg',0.9);
  records.unshift({dataUrl,ts,verdict});
  renderRecords();
}

// ── Records ─────────────────────────────────────────────────
function toggleRecords(){
  const p=document.getElementById('records-panel');
  p.style.display=p.style.display==='flex'?'none':'flex';
}
function renderRecords(){
  const list=document.getElementById('records-list');
  document.getElementById('no-records').style.display=records.length?'none':'block';
  list.querySelectorAll('.record-item').forEach(e=>e.remove());
  records.forEach((r,i)=>{
    const vText=r.verdict==='ok'?'✓ 合格':r.verdict==='ng'?'✗ 不合格':'未標記';
    const vCls=r.verdict==='ok'?'r-ok':r.verdict==='ng'?'r-ng':'r-none';
    const div=document.createElement('div');
    div.className='record-item';
    div.innerHTML=`<img src="${r.dataUrl}"><div class="record-info"><span class="r-time">${r.ts}</span><span class="r-verdict ${vCls}">${vText}</span></div><button class="record-dl" onclick="dl(${i})">⬇</button>`;
    list.appendChild(div);
  });
}
function dl(i){
  const r=records[i];
  const a=document.createElement('a');
  a.href=r.dataUrl;
  a.download='pallet_'+r.ts.replace(/[/ :]/g,'-')+'.jpg';
  a.click();
}
</script>
</body>
</html>
